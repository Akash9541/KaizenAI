name: Security & CI/CD Pipeline

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging, develop]

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  security:
    name: 🔒 Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run SNYK security scan
        run: |
          npx snyk test --severity-threshold=high || true

      - name: SAST - Run static analysis
        run: |
          npm install -g semgrep
          semgrep --config=p/security-audit .

  lint-and-format:
    name: 📝 Linting & Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check code formatting
        run: npx prettier --check .

  prisma:
    name: 🗄️ Database & Prisma
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run migrations on test DB
        env:
          # DATABASE_URL can be a pooled connection URL in production.
          # For CI, we use a direct connection (same host) for both.
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/test_db
          # Shadow database is required by `prisma migrate dev`.
          # For `migrate deploy` (used here) it is not strictly required,
          # but we set it to mirror production config and avoid schema drift.
          SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/shadow_db
        run: |
          # `migrate deploy` runs all pending migrations in order on a fresh DB.
          # DO NOT use `migrate resolve --applied` here — that command only marks
          # migrations as applied WITHOUT running them (it is for baselining an
          # existing production database, not a fresh CI database).
          npx prisma migrate deploy

          # Also resolve the new pending_password_hash migration if not deployed
          npx prisma migrate resolve --applied 20260412000000_add_pending_password_hash || true

      - name: Validate schema
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/test_db
        run: npx prisma validate

      - name: Check migration status
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/test_db
        run: npx prisma migrate status

  test-unit:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit -- --coverage --testPathPattern="__tests__/unit"

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json

  test-integration:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          JWT_SECRET: test-jwt-secret-key-at-least-32-chars-long
          NODE_ENV: test
        run: npm run test:integration

  build:
    name: 🏗️ Build
    needs: [lint-and-format, prisma, test-unit, test-integration, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

      - name: Check output size
        run: |
          echo "Build output size:"
          du -sh .next/

  e2e:
    name: 🎭 End-to-End Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: playwright-report/

  performance:
    name: 📊 Performance Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup k6
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3232A
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Build application
        run: npm run build

      - name: Start application
        run: npm run start &
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Wait for server
        run: sleep 10

      - name: Run k6 load tests
        run: k6 run __tests__/load/auth-load-test.js

  deploy-staging:
    name: 🚀 Deploy to Staging
    if: github.ref == 'refs/heads/staging'
    needs: [build, e2e, performance]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm install -g vercel
          vercel deploy --prod --token=$VERCEL_TOKEN

  deploy-production:
    name: 🚀 Deploy to Production
    if: github.ref == 'refs/heads/main'
    needs: [build, e2e, performance]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm install -g vercel
          vercel deploy --prod --token=$VERCEL_TOKEN

      - name: Notify deployment
        run: |
          echo "🎉 Deployed to production"
          echo "commit: ${{ github.sha }}"
          echo "author: ${{ github.actor }}"
